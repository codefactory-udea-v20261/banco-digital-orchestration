global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'core-banking'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['core-banking:8080']

  - job_name: 'identity'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['identity:8080']

  - job_name: 'audit'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['audit:8080']

  - job_name: 'reporting'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['reporting:8080']