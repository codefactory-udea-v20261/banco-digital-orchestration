apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: banco-digital
  labels:
    app: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      serviceAccountName: identity
      containers:
        - name: identity
          image: us-central1-docker.pkg.dev/project-2183efe1-b87d-4c12-966/banco-digital-repo/banco-digital-identity:e8a3fa08da91a79437ff959587905ee3dd9ead5b
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: shared-config
            - configMapRef:
                name: identity-config
          env:
            - name: PORT
              value: "8081"
            - name: DB_USERNAME
              value: "identity_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: IDENTITY_DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          # tcpSocket probes — Spring Security in this service blocks
          # /actuator/health/* with HTTP 403 for unauthenticated callers,
          # which fails kubelet's HTTP probe. Until SecurityConfig is
          # updated to permit /actuator/health/**, port-open is the
          # liveness signal we have.
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
