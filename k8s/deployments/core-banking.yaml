apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: banco-digital
  labels:
    app: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      serviceAccountName: core
      containers:
        - name: core
          # CI replaces :latest with $GITHUB_SHA before kubectl apply.
          # Pin to the SHA tag CI pushes; CI's sed step still rewrites this
          # to $GITHUB_SHA on each deploy.
          image: us-central1-docker.pkg.dev/project-2183efe1-b87d-4c12-966/banco-digital-repo/banco-digital-core:45d93fcc3cd5fca76271d78267dc3339e5663957
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: shared-config
            - configMapRef:
                name: core-banking-config
          env:
            - name: DB_USERNAME
              value: "core_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: CORE_DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: ENCRYPTION_KEY
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
