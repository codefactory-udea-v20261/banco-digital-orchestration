apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity
  namespace: banco-digital
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: identity
  namespace: banco-digital
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["shared-config", "identity-config"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: identity
  namespace: banco-digital
subjects:
  - kind: ServiceAccount
    name: identity
    namespace: banco-digital
roleRef:
  kind: Role
  name: identity
  apiGroup: rbac.authorization.k8s.io
