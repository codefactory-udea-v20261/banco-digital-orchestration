apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: banco-digital
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway
  namespace: banco-digital
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["shared-config", "gateway-config"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway
  namespace: banco-digital
subjects:
  - kind: ServiceAccount
    name: gateway
    namespace: banco-digital
roleRef:
  kind: Role
  name: gateway
  apiGroup: rbac.authorization.k8s.io
