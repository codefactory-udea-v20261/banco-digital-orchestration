apiVersion: v1
kind: ServiceAccount
metadata:
  name: core
  namespace: banco-digital
automountServiceAccountToken: true
---
# Read-only access to the ConfigMaps this service consumes. No Secrets,
# no Pods, no other namespaces. If spring-cloud-kubernetes-config is added
# later for hot-reload of non-secret config, this Role is what makes it work.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: core
  namespace: banco-digital
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["shared-config", "core-banking-config"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: core
  namespace: banco-digital
subjects:
  - kind: ServiceAccount
    name: core
    namespace: banco-digital
roleRef:
  kind: Role
  name: core
  apiGroup: rbac.authorization.k8s.io
