apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: banco-digital
  labels:
    app: postgres
spec:
  clusterIP: None  # headless — required for StatefulSet stable DNS
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: banco-digital
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            # Per-service passwords are exposed to the init.sh script that
            # mounts under /docker-entrypoint-initdb.d. They are not used
            # by postgres itself after first boot — they are baked into the
            # per-service roles via CREATE USER ... WITH PASSWORD.
            - name: CORE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: CORE_DB_PASSWORD
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: IDENTITY_DB_PASSWORD
            - name: AUDIT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: AUDIT_DB_PASSWORD
            - name: REPORTING_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: REPORTING_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
