apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: banco-digital
  labels:
    app: grafana
    component: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: banco-digital
        orgId: 1
        folder: Banco Digital
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

  banco-digital-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"banco-digital-.*\"}[5m])) by (job)",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "HTTP requests / sec por microservicio",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{job=~\"banco-digital-.*\", area=\"heap\"}) by (job)",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "JVM heap usado por microservicio",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=~\"banco-digital-.*\"}[5m])) by (le, job))",
              "legendFormat": "p95 {{job}}",
              "refId": "A"
            }
          ],
          "title": "Latencia HTTP p95",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["banco-digital"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "title": "Banco Digital - Overview",
      "uid": "banco-digital-overview",
      "version": 1
    }
