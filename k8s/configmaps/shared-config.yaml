apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: banco-digital
data:
  # Postgres — single instance, per-service databases created by postgres-init.
  DB_HOST: "postgres"
  DB_PORT: "5432"

  # Kafka — listener address inside the cluster. Three forms are exposed
  # because the codebase references all three at different call sites.
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_BROKERS: "kafka:9092"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka:9092"

  # Redis — used by gateway (rate limit) and identity (token blacklist).
  # Both forms exposed: core's application.yml uses $REDIS_HOST directly,
  # gateway and identity use the SPRING_DATA_REDIS_* form.
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"

  # Tracing off — flip on after deploying Tempo/Zipkin in-cluster.
  SPRING_ZIPKIN_ENABLED: "false"
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"

  # Service-to-service URLs. CORE_BANKING_SERVICE_URL is the name the gateway
  # routing config expects; CORE_SERVICE_URL is kept as an alias so older
  # references in core itself still resolve.
  IDENTITY_SERVICE_URL: "http://identity:8081"
  AUDIT_SERVICE_URL: "http://audit:8082"
  REPORTING_SERVICE_URL: "http://reporting:8083"
  CORE_BANKING_SERVICE_URL: "http://core:8080"
  CORE_SERVICE_URL: "http://core:8080"

  # CORS — every Spring app on the path applies it via $CORS_ALLOWED_ORIGINS.
  # Tighten this for production; the localhost values cover the common dev front-ends.
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:4200"
