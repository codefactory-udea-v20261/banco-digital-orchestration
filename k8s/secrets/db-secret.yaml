# SCHEMA ONLY. Do not apply this file directly with `kubectl apply`.
# Real values are injected at deploy time by k8s/apply.sh from these
# environment variables (CI sources them from GitHub Secrets):
#   POSTGRES_PASSWORD       — Postgres superuser, used by the postgres
#                             container's POSTGRES_PASSWORD env. The
#                             services never connect with this credential.
#   CORE_DB_PASSWORD        — banco_digital_core      / role core_user
#   IDENTITY_DB_PASSWORD    — banco_digital_identity  / role identity_user
#   AUDIT_DB_PASSWORD       — banco_digital_audit     / role audit_user
#   REPORTING_DB_PASSWORD   — banco_digital_reporting / role reporting_user
# Plaintext credentials must never appear in this file.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: banco-digital
type: Opaque
data:
  # Superuser — only the postgres pod and the init script use these.
  POSTGRES_USER: ""             # Value injected by CI pipeline
  POSTGRES_PASSWORD: ""         # Value injected by CI pipeline
  # Per-service credentials — each service Deployment maps these into the
  # DB_USERNAME/DB_PASSWORD env vars its Spring Boot config expects.
  CORE_DB_PASSWORD: ""          # Value injected by CI pipeline
  IDENTITY_DB_PASSWORD: ""      # Value injected by CI pipeline
  AUDIT_DB_PASSWORD: ""         # Value injected by CI pipeline
  REPORTING_DB_PASSWORD: ""     # Value injected by CI pipeline
