# SCHEMA ONLY. Do not apply this file directly with `kubectl apply`.
# Real value is injected at deploy time by k8s/apply.sh from the
# JWT_SECRET environment variable (which CI sources from GitHub Secrets).
# The HS256 signing secret must never be committed here.
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: banco-digital
type: Opaque
data:
  JWT_SECRET: ""           # Value injected by CI pipeline
