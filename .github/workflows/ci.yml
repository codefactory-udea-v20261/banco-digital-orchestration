name: CI Pipeline — All Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  validate:
    name: Validate All pom.xml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Validate banco-digital
        run: cd banco-digital && mvn -B validate
      - name: Validate banco-digital-gateway
        run: cd banco-digital-gateway && mvn -B validate
      - name: Validate banco-digital-identity
        run: cd banco-digital-identity && mvn -B validate
      - name: Validate banco-digital-audit
        run: cd banco-digital-audit && mvn -B validate
      - name: Validate banco-digital-reporting
        run: cd banco-digital-reporting && mvn -B validate
      - name: Validate eureka-server
        run: cd eureka-server && mvn -B validate

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run unit tests - banco-digital
        run: cd banco-digital && mvn -B test -P ci
      - name: Run unit tests - banco-digital-gateway
        run: cd banco-digital-gateway && mvn -B test -P ci
      - name: Run unit tests - banco-digital-identity
        run: cd banco-digital-identity && mvn -B test -P ci
      - name: Run unit tests - banco-digital-audit
        run: cd banco-digital-audit && mvn -B test -P ci
      - name: Run unit tests - banco-digital-reporting
        run: cd banco-digital-reporting && mvn -B test -P ci
      - name: Run unit tests - eureka-server
        run: cd eureka-server && mvn -B test

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build banco-digital
        run: cd banco-digital && mvn -B package -DskipTests
      - name: Build banco-digital-gateway
        run: cd banco-digital-gateway && mvn -B package -DskipTests
      - name: Build banco-digital-identity
        run: cd banco-digital-identity && mvn -B package -DskipTests
      - name: Build banco-digital-audit
        run: cd banco-digital-audit && mvn -B package -DskipTests
      - name: Build banco-digital-reporting
        run: cd banco-digital-reporting && mvn -B package -DskipTests
      - name: Build eureka-server
        run: cd eureka-server && mvn -B package -DskipTests

  integration-tests:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build
    services:
      docker:
        image: docker:29.4.1-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Setup Docker
        uses: docker/setup-docker-action@v4
      - name: Run integration tests - banco-digital
        run: cd banco-digital && mvn -B verify -P ci
      - name: Run integration tests - banco-digital-identity
        run: cd banco-digital-identity && mvn -B verify -P ci
      - name: Run integration tests - banco-digital-audit
        run: cd banco-digital-audit && mvn -B verify -P ci
      - name: Run integration tests - banco-digital-reporting
        run: cd banco-digital-reporting && mvn -B verify -P ci

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build with Maven
        run: |
          cd banco-digital && mvn -B package -DskipTests
          cd ../banco-digital-gateway && mvn -B package -DskipTests
          cd ../banco-digital-identity && mvn -B package -DskipTests
          cd ../banco-digital-audit && mvn -B package -DskipTests
          cd ../banco-digital-reporting && mvn -B package -DskipTests
          cd ../eureka-server && mvn -B package -DskipTests
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push banco-digital
        uses: docker/build-push-action@v5
        with:
          context: ./banco-digital
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/banco-digital:latest
      - name: Build and push banco-digital-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./banco-digital-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/banco-digital-gateway:latest
      - name: Build and push banco-digital-identity
        uses: docker/build-push-action@v5
        with:
          context: ./banco-digital-identity
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/banco-digital-identity:latest
      - name: Build and push banco-digital-audit
        uses: docker/build-push-action@v5
        with:
          context: ./banco-digital-audit
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/banco-digital-audit:latest
      - name: Build and push banco-digital-reporting
        uses: docker/build-push-action@v5
        with:
          context: ./banco-digital-reporting
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/banco-digital-reporting:latest
      - name: Build and push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest
