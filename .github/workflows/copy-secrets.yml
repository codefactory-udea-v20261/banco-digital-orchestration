name: Copy Secrets to Gateway

on:
  workflow_dispatch:

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Copy secrets to gateway repo
        env:
          MAIN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          IDENTITY_SERVICE_URL: ${{ secrets.IDENTITY_SERVICE_URL }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          echo "Setting secrets in gateway repo..."
          gh secret set ENCRYPTION_KEY --repo codefactory-udea-v20261/banco-digital-gateway --body "$ENCRYPTION_KEY"
          gh secret set JWT_SECRET --repo codefactory-udea-v20261/banco-digital-gateway --body "$JWT_SECRET"
          gh secret set IDENTITY_SERVICE_URL --repo codefactory-udea-v20261/banco-digital-gateway --body "$IDENTITY_SERVICE_URL"
          gh secret set GCP_PROJECT_ID --repo codefactory-udea-v20261/banco-digital-gateway --body "$GCP_PROJECT_ID"
          gh secret set GCP_REGION --repo codefactory-udea-v20261/banco-digital-gateway --body "$GCP_REGION"
          gh secret set GCP_SERVICE_ACCOUNT --repo codefactory-udea-v20261/banco-digital-gateway --body "$GCP_SERVICE_ACCOUNT"
          gh secret set GCP_WORKLOAD_IDENTITY_PROVIDER --repo codefactory-udea-v20261/banco-digital-gateway --body "$GCP_WORKLOAD_IDENTITY_PROVIDER"
          echo "✅ All secrets copied successfully!"
